"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Line Break Module
[line_break]
format = "\n"

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

palette = "cyberpunk_neon"

# Replace the 'ÔØ»' symbol in the prompt with 'Ô×£'
[character] # The name of the module we are configuring is 'character'
disabled = false
success_symbol = '[´üí ](bold green)' # The 'success_symbol' segment is being set to 'Ô×£' with the color 'bold green'
error_symbol = "[´üí ](bold red)"
vicmd_symbol = "[¯ƒà ](bold yellow)"

[time]
disabled = true
format = '[´É║ $time](bold fg:#6c7086)'
time_format = '%T'

[cmd_duration]
show_milliseconds = true
min_time = 100
format = "[¾░öƒ $duration ](bold cyan)"
disabled = true

[os]
disabled = true
format = "(fg:#89b4fa)[$symbol]($style)(fg:#89b4fa)"
style = "fg:#00ff00 bg:#00000000"

[sudo]
disabled = false
symbol = ' ¾░┐å sudo'
format = "(fg:#eba0ac)[$symbol]($style)(fg:#eba0ac)"
style = "bold fg:#313244 bg:#eba0ac "

[custom.venv]
disabled = true
command = "basename \"$VIRTUAL_ENV\""
when = "test -n \"$VIRTUAL_ENV\""
format = "(fg:#cba6f7)[$output]($style)(fg:#cba6f7)"
style = "bold fg:#313244 bg:#cba6f7"

[direnv]
disabled = false
format = "(fg:#89dceb)[$symbol$allowed]($style)(fg:#89dceb)"
