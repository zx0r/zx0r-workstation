# Enterprise: Session health management
bind -N "Show session audit log" C-a display-popup -E -w 80% -h 60% \
  "tail -100 $XDG_STATE_HOME/tmux/session-audit.log 2>/dev/null || tail -100 $HOME/.local/state/tmux/session-audit.log 2>/dev/null || echo 'No audit log found'"

bind -N "Show session statistics" C-s display-popup -E -w 60% -h 40% \
  "echo 'Sessions: #S' && echo 'Windows: #{session_windows}' && echo 'Panes: #{window_panes}' && echo 'Uptime: #S'"

