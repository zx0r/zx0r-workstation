# Complete tmux configuration file with all available options
# Target system: macOS (Apple Silicon M4 Pro), Kitty terminal, Fish shell
#
# Place at ~/.tmux.conf or $XDG_CONFIG_HOME/tmux/tmux.conf
# Apply without restart: tmux source-file ~/.tmux.conf
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. SERVER OPTIONS (set -s)
#    Affect the entire tmux server; independent of sessions/windows/panes.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Value of TERM environment variable for new windows. Must be `screen`, `tmux`
# or a derivative. For Kitty, `tmux-256color` is recommended.
# Default terminal type (e.g., "screen-256color" or "tmux-256color")
set -s default-terminal "tmux-256color"

# ---------- Shell & Command ----------
# Default command for new windows (if not specified). Empty string runs a login
# shell using default-shell.
# Type: command (default: "")
set -g default-command ""

# Absolute path to the default shell. Used when default-command is empty.
# Under Fish, this would be /opt/homebrew/bin/fish or similar.
# Type: string (default: determined by shell variable or /bin/sh)
set -g default-shell "/opt/homebrew/bin/fish"

# Terminal features array. Tells tmux about terminal capabilities that cannot
# be autodetected. Format: "glob_pattern:feature1,feature2,..."
# Useful for Kitty: supports RGB, overline, hyperlinks, etc.
# Example: set -s terminal-features[0] "kitty*:RGB,overline,hyperlinks"
# overline,hyperlinks,clipboard,ccolour,cstyle,extkeys,focus,mouse,overline,strikethrough,sync,title,usstyle

# kitty fully supported features (safe subset)
set -as terminal-features ",xterm-kitty:RGB,clipboard,hyperlinks,extkeys,focus,overline,strikethrough,cstyle,usstyle,mouse"

# Terminal overrides array. Override specific terminfo capabilities per terminal
# type. Format: "glob_pattern:capability=value"
# '\E[%p1%d q:Se=\E[3q:Smulx=\E[4::%p1%dm:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -as terminal-overrides ",xterm-kitty:Se=\E[3q"

# User-defined key sequences (array). Each entry becomes a User0, User1, ...
# key that can be bound in key tables.
# set -s user-keys "\e[5;30012~"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ---------- Mouse ----------
# mouse [on | off]
# If on, tmux captures the mouse and allows mouse events to
# be bound as key bindings.  See the “MOUSE SUPPORT” section for details.
set -g mouse on

# ---------- Key Tables & Prefix ----------
# Default key table (where keys without prefix are looked up).
# Type: string (default: "root")
set -g key-table root

# Main prefix key. Special value "None" disables the prefix.
# Type: key (default: C-b)
set -g prefix C-a

# Secondary prefix key. Also accepts "None".
# Type: key (default: None)
set -g prefix2 None

# Time in ms to wait after the prefix before dismissing it (0 = no timeout).
# Type: number (default: 500)
set -g prefix-timeout 500

# File where command prompt history is saved on exit and loaded on start.
# Empty string disables history file.
# Type: string (default: "")
# set -s history-file "~/.local/share/tmux/history"

# Custom command aliases (array). Creates shortcuts for long commands.
# Format: command-alias[INDEX] "alias=command"
# Example: set -s command-alias[100] "zoom=resize-pane -Z"
# set -s command-alias[100] "zoom=resize-pane -Z"

# Override widths of Unicode codepoints (array). Each entry: codepoint=width.
# Codepoint can be the character itself or U+XXXX (hex). Width is 0, 1, or 2.
# set -s codepoint-widths[0] "U+2603=2"

# ---------- Keyboard & Input ----------
# Key sent by the terminal for Backspace. Usually "BSpace".
set -s backspace '0x7f'

# Maximum number of paste buffers. Oldest is deleted when limit is exceeded.
# Type: number (default: 50)
set -s buffer-limit 50

# Default command to pipe copied text if copy-pipe is used without arguments.
# Type: string (default: "")
set -g copy-command 'pbcopy'

# Default tmux command when invoked without an explicit command.
# Type: command (default: new-session)
set -s default-client-command new-session

# Time in milliseconds tmux waits after an escape character to determine if it
# is part of an escape sequence or a standalone Escape/Meta key.
# Type: number (default: 500)
set -s escape-time 0

# Command to invoke when an external editor is needed (e.g., C-x in command prompt).
# Type: string (default: "vi")
set -s editor "vi"

# Exit the server when no sessions exist.
# Type: flag (on|off, default: on)
set -s exit-empty on

# Exit the server when no clients are attached.
# Type: flag (on|off, default: off)
set -s exit-unattached off

# Control reporting of modified keys (Ctrl/Alt/Shift).
# on    - applications may request mode 1 or 2
# always- force mode 1 always
# off   - standard keys only
# Type: choice (on|always|off, default: on)
set -s extended-keys on

# Format for reporting modified keys (only relevant if extended-keys is on).
# csi-u: CSI sequence ending with 'u'
# xterm: CSI sequence ending with '~'
# Type: choice (csi-u|xterm, default: csi-u)
set -s extended-keys-format csi-u

# Request focus events from the terminal and forward to applications.
# Detach/reattach clients after changing this.
# Type: flag (on|off, default: off)
set -s focus-events on

# When mouse is on, moving the mouse into a pane selects it.
# Type: flag (on|off, default: off)
# set -s focus-follows-mouse on

# Behaviour when an application requests the clipboard.
# off     - ignore request
# request - request clipboard from the most recent client
# buffer  - same as request, but also create a paste buffer
# both    - deprecated alias for request
# Type: choice (off|request|buffer|both, default: off)
# set -s get-clipboard buffer

# Controls tmux's interaction with the terminal clipboard.
# on       - accept clipboard escape sequences and attempt to set the terminal clipboard
# external - only attempt to set the terminal clipboard (ignore applications setting buffers)
# off      - do nothing
# Type: choice (on|external|off, default: off)
set -s set-clipboard external

# Maximum size (bytes) of a single escape/control sequence; larger sequences
# are discarded.
# Type: number (default: 16384)
#set -s input-buffer-size 16384

# Maximum number of entries in command prompt history files (per prompt type).
# Type: number (default: 100)
set -s prompt-history-limit 10000

# Maximum number of server messages kept per client (displayed by show-messages).
# Type: number (default: 100)
set -s message-limit 100

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2. GLOBAL SESSION OPTIONS (set -g)
#    Default values for all sessions; overridden by per-session settings.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ---------- Activity & Bell ----------
# Action when activity occurs in a monitored window.
# any     - alert/msg in any window of the session
# none    - ignore
# current - only in windows other than the current
# other   - only in the current window
# Type: choice (any|none|current|other, default: any)
set -g activity-action any

# Action when a bell occurs in a monitored window. Same values as activity-action.
set -g bell-action any

# Enable visual indication (message) on activity.
# off  - only terminal bell
# on   - message without bell
# both - both bell and message
# Type: choice (on|off|both, default: off)
set -g visual-activity off

# Visual bell behaviour (like visual-activity for bells).
set -g visual-bell off

# Visual silence behaviour (monitor-silence).
set -g visual-silence off

# ---------- Sizing & Layout ----------
# Base index for window numbering (first window index). Typically 0 or 1.
# Type: number (default: 0)
set -g base-index 0

# Session default size for new windows when window-size=manual or session
# created with -d. Format: WIDTHxHEIGHT.
# Type: string (default: "80x24")
set -g default-size "80x24"

# ---------- Session Lifetime ----------
# Destroy a session after the last client detaches?
# off       - leave it orphaned
# on        - destroy it
# keep-last - destroy if group has other sessions
# keep-group- destroy unless it's the only session in the group
# Type: choice (on|off|keep-last|keep-group, default: off)
set -g destroy-unattached off

# When a session is destroyed, what happens to attached clients?
# on          - detach the client
# off         - switch to most recent remaining session
# no-detached - detach only if no detached sessions exist
# previous    - switch to previous session alphabetically
# next        - switch to next session alphabetically
# Type: choice (on|off|no-detached|previous|next, default: on)
set -g detach-on-destroy on

# ---------- Display & Messages ----------
# Time in milliseconds that display-panes indicators remain on screen.
# Type: number (default: 1000)
set -g display-panes-time 1000

# Time in milliseconds that status messages are displayed (0 = until key).
# Type: number (default: 750)
set -g display-time 750

# Line number where messages/command prompt appear (0 = first line).
# Only meaningful when status is multi-line (2-5).
# Type: number (0-4, default: 0)
set -g message-line 0

# ---------- History ----------
# Maximum lines of scrollback history for new windows.
# Existing windows retain their current limit.
# Type: number (default: 2000)
set -g history-limit 10000

# ---------- Key Repeat ----------
# Time in ms for the initial repeat delay of keys bound with -r.
# If 0, repeat-time is used instead.
# Type: number (default: 500)
set -g initial-repeat-time 1000

# Time in ms during which a repeated key binding does not require the prefix
# to be pressed again.
# Type: number (default: 500)
set -g repeat-time 1000

# Allow multiple commands without prefix if typed within repeat-time.
# The -r flag on a binding enables this feature.
# (No separate option, controlled by bind-key -r.)

# ---------- Locking ----------
# Lock after N seconds of inactivity (0 = never).
# Type: number (default: 0)
set -g lock-after-time 600

# Command to run when locking a client.
# Type: command (default: "lock -np")
set -g lock-command "lock -np"

# ---------- Renumber Windows ----------
# Automatically renumber windows when one is closed to keep sequential order.
# Type: flag (on|off, default: off)
set -g renumber-windows off

# ---------- Copy Mode ----------
# Characters considered word separators for word movements in copy mode.
# Type: string (default: " -_@")
set -g word-separators " -_@"
# set -g word-separators '=+!@#$%^&*,.<>/?;:\\|~`(){}[]"'

# ---------- Command Prompt ----------
# Cursor style (block, underline, bar) in the command prompt.
# Type: choice (block|underline|bar, default: block)
set -g prompt-cursor-style underline

# Cursor style when vi keys are enabled and the prompt is in command mode.
# Type: choice (default: block)
# set -g prompt-command-cursor-style block

# ---------- Menus ----------
# Type of characters used for menu borders.
# simple, padded, none, double, heavy, rounded, ...
# Type: choice (default: simple)
set -g menu-border-lines simple

# Key binding style (vi or emacs) in status line and command prompt.
# Type: choice (vi|emacs, default: emacs unless VISUAL/EDITOR contains 'vi')
set -g status-keys vi

# ---------- Pane Behaviour ----------
# Allow programs to bypass tmux via passthrough sequences
# on (only visible) | off | all (even invisible)
set -g allow-passthrough on

# Allow programs to rename the window (\ek…\e\\)
set -g allow-rename off

# Allow programs to set the pane title (\e]2;…\e\\)
set -g allow-set-title on

# Alternate screen (smcup/rmcup) support
set -g alternate-screen on

# Cursor colour and style (default, blinking-block, block, underline, etc.)
# set -gp cursor-colour default
set -g cursor-style 'blinking-underline'

# Default colour palette (array) – index 0‑255, each entry a colour
# set -gp pane-colours "black"

# Remain on exit: on | off | failed
set -g remain-on-exit on

# Text shown at bottom of dead panes when remain-on-exit is on
set -g remain-on-exit-format "Pane is dead"

# Scroll into history when whole screen is cleared
set -g scroll-on-clear on

# Synchronize input to all panes in same window (only those with option on)
set -g synchronize-panes off

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3. GLOBAL WINDOW OPTIONS (set -gw)
#    Defaults for all windows; inherited by panes unless overridden.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ---------- Resizing & Layout ----------
# Aggressively resize the window to the size of the smallest or largest session
# containing it.
# Type: flag (on|off, default: off)
set -gw aggressive-resize on

# Height of the main (top) pane in main-horizontal-ish layouts.
# Can be a number of lines or a percentage (e.g., "50%").
# Type: size (default: 24)
set -gw main-pane-height 24

# Width of the main (left) pane in main-vertical-ish layouts.
# Type: size (default: 80)
set -gw main-pane-width 80

# Height of non-main panes in main-horizontal layouts (0 = no effect).
# Type: size (default: 0)
set -gw other-pane-height 0

# Width of non-main panes in main-vertical layouts.
# Type: size (default: 0)
set -gw other-pane-width 0

# Base index for pane numbering (0 or 1).
# Type: number (default: 0)
set -gw pane-base-index 0

# Window size mode.
# smallest - fit smallest session containing the window
# largest  - fit largest session
# manual   - fixed size (default-size or explicit)
# Type: choice (smallest|largest|manual, default: smallest)
set -gw window-size smallest

# Character used to fill unused areas of the terminal.
# Type: string (default: ".")
set -gw fill-character "."

# ---------- Window Naming ----------
# Automatically rename windows based on automatic-rename-format.
# Disabled per window if name is set explicitly.
# Type: flag (on|off, default: on)
set -gw automatic-rename off

# Format string for automatic window renaming.
# Type: format (default: "#{b:pane_current_command}")
set -gw automatic-rename-format "#{b:pane_current_command}"

# ---------- Monitoring ----------
# Monitor for activity in the window (highlight in status line).
# Type: flag (on|off, default: off)
set -gw monitor-activity off

# Monitor for bell in the window.
# Type: flag (on|off, default: on)
set -gw monitor-bell on

# Monitor for silence (no output) for the given interval in seconds.
# 0 disables. When triggered, the window is highlighted.
# Type: number (default: 0)
set -gw monitor-silence 0

# ---------- Remain on Exit ----------
# Keep the pane/window alive after the command exits.
# Type: flag (on|off, default: on)
set -gw remain-on-exit on

# ---------- Copy Mode Styles ----------
# Key binding style for copy/view mode: vi or emacs.
# Type: choice (vi|emacs, default: emacs unless VISUAL/EDITOR contains 'vi')
set -gw mode-keys vi

# ---------- Pane Scrollbars ----------
# off | modal | on
set -gw pane-scrollbars off

# Scrollbar position: left | right
set -gw pane-scrollbars-position right

# ---------- Tiled Layout ----------
# Maximum columns in tiled layout (0 = no limit)
set -gw tiled-layout-max-columns 0

# Wrap search in copy mode
set -gw wrap-search on

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

