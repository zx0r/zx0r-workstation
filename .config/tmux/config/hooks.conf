# show-hooks [-gpw]    [-t target-pane]
# set-hook   [-agpRuw] [-t target-pane] hook-name command
#   -a  в†’ append to hook
#   -g  в†’ add hook to global list
#   -p  в†’ set pane hooks
#   -R  в†’ run hook immediately
#   -t  в†’ specify target session
#   -u  в†’ unset a hook
#   -w  в†’ set window hooks

# в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ

# Auto hide pane-border-status line when only one pane is displayed
set-hook -g after-new-session  { if -F '#{==:#{window_panes},1}' 'set pane-border-status off' 'set pane-border-status on' }
set-hook -g after-new-window   { if -F '#{==:#{window_panes},1}' 'set pane-border-status off' 'set pane-border-status on' }

set-hook -wg window-linked      { if -F '#{==:#{window_panes},1}' 'display "link one"' 'display "link two"' }
set-hook -wg window-unlinked    { if -F '#{==:#{window_panes},1}' 'display "unlink one"' 'display "unlink two"' }

set-hook -g after-kill-pane    { if -F '#{==:#{window_panes},1}' 'set pane-border-status off' 'set pane-border-status on' }
set-hook -g pane-exited        { if -F '#{==:#{window_panes},1}' 'set pane-border-status off' 'set pane-border-status on' }

# Adjust pane border status after splitting a window
set-hook -g after-split-window { if -F '#{window_panes} -gt 1' 'set pane-border-status top' }

set-hook -g after-resize-pane {
  if -F '#{||:#{==:#{window_panes},1},#{window_zoomed_flag}}' {
    set -g pane-border-status off
  } {
    set -g pane-border-status top
  }
}

# Allow respawning windows after the command has exited
set-hook -g session-created 'set remain-on-exit on'

# Restore cursor shape after exiting copy mode
set-hook -g after-copy-mode 'set -g cursor-style blinking-underline'

# в”Ѓв”Ѓв”Ѓ Enterprise Session Health Monitoring в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ

# Log session creation for audit trail
set-hook -g session-created {
  run-shell "echo '[tmux] Session created: #S at $(date '+%Y-%m-%d %H:%M:%S')' >> $XDG_STATE_HOME/tmux/session-audit.log 2>/dev/null"
}

# Log session closure for audit trail
set-hook -g session-closed {
  run-shell "echo '[tmux] Session closed: #S at $(date '+%Y-%m-%d %H:%M:%S')' >> $XDG_STATE_HOME/tmux/session-audit.log 2>/dev/null"
}

# Warn about zombie panes (pane exited but not closed)
set-hook -g pane-died {
  display-message -d 5000 "вљ  Pane #P in window #I exited (PID: #{pane_pid}). Consider: respawn-pane -t #{pane_id}"
}

# Health check: notify if session has been idle for too long
set-hook -g client-active {
  run-shell "tmux set -g @last_activity $(date +%s) 2>/dev/null"
}

