# в”Ғв”Ғв”Ғ Themes в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ

# 1. Default (fallback)
set -g @theme "dark"

# 2. Platform-aware override (macOS only)
# --- UI components ---
if-shell -b '[ "$(uname)" = "Darwin" ] && defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark' \
  'set -g @theme "dark"' 'set -g @theme "light"'

# 3. Single source of truth
source-file -F -q "#{@tmux_dir}/theme/#{@theme}.tmux"

# --- UI components ---
set -g @date   "#[fg=#{@thm_subtext_1}]%Y.%m.%d %I:%M%p"
set -g @pane   "#[default,bg=#{@thm_surface_0},fg=#{@thm_pink}]пүҚ #P"
set -g @zoom   "#[default,bg=#{@thm_surface_0},fg=#{@thm_peach}]#{?window_zoomed_flag,пҢҮ ,пҢҮ }" # п”Ң
set -g @prefix "#[bold]#{?client_prefix,#[fg=#{@thm_green}]у°ҳі ,#[fg=#{@thm_mauve}]у°ҳі }"

# --- Status Component: Project/Path Indicator ---
set -g @status_project "#[noreverse,noitalics,nounderscore,bold,fg=#{@thm_subtext_1}]пҒ» #[fg=#{@thm_subtext_1}]#{b:pane_current_path}"

# ---------- Terminal Title ----------
# Cursor colour in the command prompt.
# Type: colour (default: green)
set -g cursor-colour "#00ff00"
set -g prompt-cursor-colour "#00ff00"

# Attempt to set the client terminal title (via tsl/fsl terminfo entries).
# Type: flag (on|off, default: off)
set -g set-titles on

# Format string for the terminal title (expanded with formats).
# Type: string (default: "#S:#I:#W - \"#T\"")
set -g set-titles-string "#S:#I:#W - \"#T\""

# ---------- Status Line (general) ----------
# Show/hide the status line, or set its height in rows.
# on/off - one row; 2 - 5 rows.
# Type: choice (off|on|2|3|4|5, default: on)
set -g status on

# Override the default status line format per line (array).
# Example for a simple centered window list:
# set -g status-format[0] "#[align=centre]#{window_list}"

# Interval in seconds between forced status line redraws (0 = never).
# Type: number (default: 15)
set -g status-interval 5

# Position of the window list in the status line.
# left, centre, right, absolute-centre.
# Type: choice (left|centre|right|absolute-centre, default: left)
set -g status-justify  absolute-centre

# Position of the status line on screen.
# Type: choice (top|bottom, default: bottom)
set -g status-position bottom

# ---------- Status Line Content ----------
# Overall default style of the status line.
# Type: style (default: "bg=green,fg=#{@thm_black}")
set -g status-style "fg=#{@thm_subtext_1},bg=#{@thm_bg},bold,nounderscore,noitalics,noreverse"

# Left side of the status line (format string).
# Type: string (default: "[#S] ")
set -g status-left "#[noreverse,noitalics,nounderscore,bold,bg=#{@thm_surface_0},fg=#{@thm_pink}] оҹҒ #S #{E:@status_project}"

# Maximum character length of the left status part.
# Type: number (default: 10)
set -g status-left-length 100

# Style of the left status part (see STYLES section in man page).
# Type: style (default: "")
set -g status-left-style ""

# Right side of the status line (format string).
# Type: string (default: '"#T" %H:%M %d-%b-%Y')
set -g status-right "#(#{E:@mod_net}) #{E:@prefix} #(#{E:@mod_cpu}) #(#{E:@mod_mem}) #(#{E:@mod_ssd}) #{E:@pane} #(#{E:@mod_uptime}) #{E:@zoom} #{E:@date}"

# Maximum character length of the right status part.
# Type: number (default: 40)
set -g status-right-length 100

# Style of the right status part.
# Type: style (default: "")
set -g status-right-style ""

# ---------- Menus ----------
# Style of the menu (e.g., choose-tree).
# Type: style (default: "bg=#{@thm_bg},fg=#{@thm_fg}")
set -g menu-style "bg=#{@thm_bg},fg=#{@thm_fg}"

# Style of the selected menu item.
# Type: style (default: "bg=white,fg=#{@thm_black}")
set -g menu-selected-style "bg=white,fg=#{@thm_black}"

# Style of the menu border.
# Type: style (default: "fg=blue")
set -g menu-border-style "fg=#{@thm_green}"

# ---------- Command Prompt ----------
# Style of messages and the command prompt.
# Type: style (default: "bg=yellow,fg=#{@thm_black}")
set -g message-style "bold,bg=#{@thm_bg},fg=#{@thm_green}"

# Style for the command prompt when in vi command mode.
# Type: style (default: "bg=#{@thm_bg},fg=yellow")
set -g message-command-style "bold,fg=#{@thm_green},bg=#{@thm_bg}"

# ---------- Copy Mode Styles ----------
# Style of search matches in copy mode.
# Type: style (default: "bg=yellow,fg=#{@thm_black}")
set -gw copy-mode-match-style  "bg=#{@base0C},fg=#{@thm_black}"

# Style of the line containing the mark in copy mode.
# Type: style (default: "bg=red,fg=#{@thm_black}")
set -gw copy-mode-mark-style "bg=#{@base0C},fg=#{@thm_black},underscore"

# Style of the current search match (the one under the cursor).
# Type: style (default: "bg=green,fg=#{@thm_black}")
set -gw copy-mode-current-match-style  "bg=#{@base0C},fg=#{@thm_black},underscore"

# Format of the position indicator (top-right) in copy mode.
# Type: format (default: "#{line_count} lines")
set -gw copy-mode-position-format "#{line_count} lines"

# Style of the position indicator.
# Type: style (default: "bg=yellow,fg=#{@thm_black}")
set -gw copy-mode-position-style "bg=#{@base0C},fg=#{@thm_black}"

# Style of the selection in copy mode.
# Type: style (default: "bg=blue,fg=#{@thm_black}")
set -gw copy-mode-selection-style "bg=#{@base0C},fg=#{@thm_black}"

# Default style for window modes (copy, view, choose, etc.).
# Type: style (default: "bg=#{@thm_bg},fg=#{@thm_fg}")
set -gw mode-style "bg=#{@base0C},fg=#{@thm_black}"

# ---------- Window Status Styles ----------
# Separator between windows in status line
set -gw window-status-separator ""

# Style of inactive panes (background/foreground).
set -gw window-style "bg=default,fg=default"

# Style of the active pane.
set -gw window-active-style "bg=default,fg=default"

# Styles for window entries in status line
set -gw window-status-format "оҫӨ #I:#W "
set -gw window-status-current-format "оҫӨ #I:#W "

# Styles for window entries in status line
set -gw window-status-style "fg=#{@thm_subtext_1},bg=#{@thm_bg},bold,nounderscore,noitalics,noreverse"
set -gw window-status-current-style "fg=#{@thm_green},bg=#{@thm_bg},bold,nounderscore,noitalics,noreverse"

set -gw window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -gw window-status-activity-style "fg=#{@thm_yellow},bg=#{@thm_bg},bold,nounderscore,noitalics,noreverse"
set -gw window-status-last-style "bg=default,fg=default"

# ---------- Pane Border Details ----------
# Format shown in pane border status lines (if pane-border-status is not off)
set -gw pane-border-format '#[align=right]#{?pane_active,#[fg=#{@thm_green}]в—Ҹ,#[fg=#{@thm_mauve}]в—Ӣ}#{?#{&&:#{pane_active},#{client_prefix}},#[underscore],} #{pane_current_command} п…· #{pane_tty} #{?pane_active,пүҚ #S:#I/#{session_windows} }#{?window_zoomed_flag,в¬ў,вқ„} #P '

# Pane border indicators: off | colour | arrows | both
set -gw pane-border-indicators both

# Pane border line type: single | double | heavy | simple | number | spaces
set -gw pane-border-lines heavy

# Pane border status lines: off | top | bottom
set -gw pane-border-status top

# NonвҖ‘active pane border style
set -gw pane-border-style  "fg=#{@thm_mauve},bg=default"
set -gw pane-active-border-style '#{?pane_in_mode,fg=#{@base0C},bg=#{@thm_bg},#{?synchronize-panes,fg=#{@thm_mauve},bg=#{@thm_bg},#{?#{==:#{client_key_table},resize},fg=#{@thm_pink},bg=#{@thm_bg},fg=#{@thm_green},bg=#{@thm_bg}}}}'

# ---------- Pane Scrollbars ----------
# Scrollbar style: fg = slider, bg = scrollbar, width/pad attributes
set -gw pane-scrollbars-style "bg=#{@thm_bg},fg=#{@thm_green}"

# ---------- Session Status Styles ----------
set -gw session-status-style "bg=default,fg=default"
set -gw session-status-current-style "bg=default,fg=default,bold"

# ---------- Popup Styles ----------
set -gw popup-style "bg=default,fg=default"
# Set the type of characters used for drawing popup borders.
# single | rounded | double | heavy | simple | padded | none
set -gw popup-border-lines heavy

if -F '#{m/r:3\.[4-9]$,#{version}}' {
    set -g popup-border-lines rounded
    # set -g popup-border-style 'fg=#{@base11}'
    set -g popup-border-style 'fg=#{@thm_overlay_2}'

}

# ---------- Display & Messages ----------
# Colour for the active pane indicator (display-panes command).
# Type: colour (default: red)
set -g display-panes-active-colour '#88507D'

# Colour for inactive pane indicators.
# Type: colour (default: blue)
set -g display-panes-colour '#88507D'

# ---------- Clock Mode ----------
# Clock colour in clock mode.
# Type: colour (default: green)
set -g clock-mode-colour '#f2594b'

# Clock hour format.
# 12, 24, 12-with-seconds, 24-with-seconds.
# Type: choice (default: 12)
set -gw clock-mode-style 12

