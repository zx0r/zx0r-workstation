# ━━━ 1. Bootstrap & Base Paths ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Explicit paths ensure consistency across shells/OS. Tmux expands $HOME natively.
set -g @tmux_dir     "~/.config/tmux"
set -gF @config  "#{@tmux_dir}/config"
set -gF @scripts "#{@tmux_dir}/scripts"

# ━━━ 2. Modular Configuration ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# -q suppresses errors if a module is missing (safe for shared/dotfiles)
source-file -qF "#{@config}/core.conf"
source-file -qF "#{@config}/binds.conf"
source-file -qF "#{@config}/hooks.conf"
source-file -qF "#{@config}/theme.conf"
source-file -qF "#{@config}/plugins.conf"

# ━━━ 3. Status Modules (DRY & Maintainable) ━━━━━━━━━━━━━━━━━━━━━━━
# All paths derive from @tmux_scripts. Tmux resolves #{ } at parse time.
set -gF @mod_cpu    "#{@scripts}/cpu.sh"
set -gF @mod_mem    "#{@scripts}/mem.sh"
set -gF @mod_ssd    "#{@scripts}/ssd.sh"
set -gF @mod_git    "#{@scripts}/git.sh"
set -gF @mod_uptime "#{@scripts}/uptime.sh"
set -gF @mod_net    "#{@scripts}/network.sh"

# ━━━ 4. Environment Sync ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

set -ga update-environment "GPG_TTY SHELL EDITOR VISUAL SSH_AUTH_SOCK SSH_CONNECTION SSH_AGENT_PID"

# ━━━ 5. Conditional & Dev-Only Settings ━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Example: Load debug/dev tools only when @mode == "dev"
# Operational mode for conditional loading (dev/prod)
# set -g @mode "dev"
# if-shell 'test "#{@mode}" = "dev"' "source-file -q #{@tmux_config}/dev.conf"

